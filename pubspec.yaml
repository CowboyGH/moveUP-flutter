name: moveup_flutter
description: Mobile client for the moveUP fitness platform.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  dio: ^5.9.1
  envied: ^1.3.3
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.1.0
  json_annotation: ^4.10.0
  logger: ^2.6.2
  provider: ^6.1.5+1
  retrofit: ^4.9.2
  shared_preferences: ^2.5.4

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.11.1
  fake_async: ^1.3.3
  freezed: ^3.2.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.6.3 
  json_serializable: ^6.12.0
  retrofit_generator: ^10.2.3
  envied_generator: ^1.3.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/splash/
  
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat/Montserrat-Thin.ttf
          weight: 100
        - asset: assets/fonts/montserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/montserrat/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/montserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/montserrat/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/montserrat/Montserrat-Bold.ttf
          weight: 700
