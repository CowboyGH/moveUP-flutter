name: flutter_starter_template
description: A scalable Flutter Starter Template for building production-ready business applications.
publish_to: 'none'
version: 0.3.0

environment:
  sdk: '>=3.10.0 <4.0.0'

license: "MIT"

dependencies:
  bloc_test: ^10.0.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.1.1
  connectivity_plus: ^7.0.0
  dio: ^5.9.0
  equatable: ^2.0.7
  firebase_analytics: ^12.1.0
  firebase_auth: ^6.1.3
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.6
  firebase_storage: ^13.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.0.1
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.6.2
  mockito: ^5.6.1
  native_splash_screen: ^3.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  retrofit: ^4.9.1
  shared_preferences: ^2.5.4

dev_dependencies:
  build_runner: ^2.10.4
  freezed: ^3.2.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.1
  retrofit_generator: ^10.2.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/splash/
  
  # fonts: