name: Flutter CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.0'
  ANDROID_SDK_VERSION: '35'

jobs:
  # ==========================================
  # Job 1: Code Quality & Analysis
  # ==========================================
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get

      - name: Create .env file
        run: echo "API_URL=${{ secrets.API_URL }}" > .env

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format generated code
        run: dart format .

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib/ test/
      
      - name: Analyze code
        run: flutter analyze --fatal-infos
      
      - name: Run tests
        run: flutter test --coverage
      
      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  # ==========================================
  # Job 2: Android Build (Docker)
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true 
          tags: flutter-build:latest
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            FLUTTER_VERSION=${{ env.FLUTTER_VERSION }}
            ANDROID_SDK_VERSION=${{ env.ANDROID_SDK_VERSION }}
            API_URL=${{ secrets.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract APK
        run: |
          docker create --name temp flutter-build:latest
          mkdir -p apk-output
          docker cp temp:/artifacts/. apk-output/
          docker rm temp
          ls -lh apk-output/
      
      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: apk-output/*.apk
          retention-days: 30
          compression-level: 0
      
